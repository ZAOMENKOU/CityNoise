# 城市噪音监测与投诉系统 - 开发环境配置
server:
  # 应用运行端口，默认8080
  port: 8080
  # Servlet配置
  servlet:
    # 应用的上下文路径，设置为根路径
    context-path: /

spring:
  # 应用名称，用于日志和监控识别
  application:
    name: city_noise_system

  # 数据库配置
  datasource:
    # MySQL 8.x 驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接地址
    # city_noise_system是数据库名
    # useUnicode=true&characterEncoding=utf8 支持中文
    # serverTimezone=Asia/Shanghai 设置上海时区
    # useSSL=false 本地开发禁用SSL
    url: jdbc:mysql://localhost:3306/city_noise_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    # 数据库用户名
    username: root
    # 数据库密码
    password: 123456

  # 文件上传配置
  servlet:
    multipart:
      # 单个文件最大大小：10MB
      # 防止用户上传过大文件导致服务器资源耗尽
      max-file-size: 10MB
      # 整个HTTP请求最大大小：10MB
      # 包含所有文件和表单数据的总大小限制
      max-request-size: 10MB
      # 启用文件上传功能
      enabled: true
      # 文件大小阈值：2MB
      # 小于2MB的文件在内存中处理，大于2MB的文件会写入磁盘临时文件
      file-size-threshold: 2MB

  # 跨域配置 (CORS - Cross-Origin Resource Sharing)
  # 允许前端Vue应用（运行在localhost:5173）访问后端API
  web:
    cors:
      # 允许的请求来源，可以配置多个，用逗号分隔
      allowed-origins: "http://localhost:5173,http://localhost:5174"
      # 允许的HTTP方法
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      # 允许的请求头
      allowed-headers: "*"
      # 允许携带凭证（如Cookie、Authorization头）
      allow-credentials: true
      # 预检请求缓存时间（秒），减少重复预检请求
      max-age: 3600

  # JSON序列化配置
  jackson:
    # 日期格式，统一前后端日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区设置为上海
    time-zone: Asia/Shanghai

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # 自动将数据库下划线命名转为Java驼峰命名
    # 例如：数据库字段user_name会自动映射为Java属性userName
    map-underscore-to-camel-case: true
    # SQL日志实现：控制台输出
    # 开发时用于调试SQL语句，生产环境建议关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 全局配置
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 删除时的值
      logic-delete-value: 1
      # 未删除时的值
      logic-not-delete-value: 0
      # 插入策略：不为null的字段才插入
      insert-strategy: not_null
      # 更新策略：不为null的字段才更新
      update-strategy: not_null

# JWT配置
jwt:
  # JWT加密密钥（必须是Base64编码的）
  # 生成方法：在命令行执行：echo -n 'your-secret-key' | base64
  secret: "Y2l0eV9ub2lzZV9zeXN0ZW1fZGV2X3NlY3JldF9rZXlfMjAyNF8wMl8xNg=="
  # Token过期时间（秒）86400秒 = 1天
  expire: 86400
  # Token在HTTP请求头中的字段名
  header: Authorization
  # Token前缀，格式：Bearer {token}
  prefix: "Bearer "

# 百度地图API配置
baidu:
  map:
    # 您的百度地图AK（访问密钥）
    ak: k0IOR3G2ZQIITi6uKju83p2bP5KPqTSz
    # 地理编码服务URL
    # 用于将地址转换为经纬度坐标
    geocoding-url: "https://api.map.baidu.com/geocoding/v3/"

# 应用业务配置
app:
  # 文件上传配置
  upload:
    # 允许的文件类型，用于前端验证和后端校验
    allowed-types: ".jpg,.jpeg,.png,.gif,.bmp"
    # 分页默认大小
    page-size: 10

# 日志配置
logging:
  # 日志级别配置
  level:
    # 本项目代码使用debug级别，便于调试
    com.example: debug
    # Spring Web相关日志使用info级别
    org.springframework.web: info
    # MyBatis SQL日志
    org.apache.ibatis: debug
    # MyBatis-Plus日志
    com.baomidou.mybatisplus: debug
  # 日志文件配置
  file:
    # 日志文件路径，保存在项目根目录的logs文件夹下
    name: ./logs/city-noise-system.log
  # 日志格式
  pattern:
    # 文件日志格式
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    # 控制台日志格式
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# Swagger API文档配置
springdoc:
  # OpenAPI文档路径
  api-docs:
    path: /v3/api-docs
  # Swagger UI界面配置
  swagger-ui:
    # Swagger UI访问路径
    path: /swagger-ui.html
    # 接口按字母顺序排序
    operations-sorter: alpha
    # 标签按字母顺序排序
    tags-sorter: alpha
  # 扫描的Controller包路径
  packages-to-scan: com.example.city_noise_system.controller
  # 默认的请求Content-Type
  default-consumes-media-type: application/json
  # 默认的响应Accept
  default-produces-media-type: application/json